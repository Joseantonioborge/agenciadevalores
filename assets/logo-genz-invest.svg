<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Arrow Z shape -->
  <g filter="url(#glow)">
    <!-- Down-right stroke of Z -->
    <path d="M130 95 L200 95 L130 195" stroke="url(#arrowGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Up-right stroke with arrowhead -->
    <path d="M130 195 L230 95" stroke="url(#arrowGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrowhead -->
    <path d="M205 78 L235 88 L218 115" stroke="url(#arrowGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small arrow tip fill -->
    <polygon points="230,85 245,78 235,105" fill="url(#arrowGrad)"/>
  </g>
  <!-- GenZ text -->
  <text x="200" y="280" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="88" font-weight="800" fill="url(#textGrad)" letter-spacing="-2">
    <tspan fill="#38BDF8">Gen</tspan><tspan fill="#E2E8F0">Z</tspan>
  </text>
  <!-- Invest text -->
  <text x="200" y="340" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="64" font-weight="600" fill="#CBD5E1" letter-spacing="4">Invest</text>
</svg>